groups:
  - name: engineering_dashboard_alerts
    rules:
      - alert: BackendDown
        expr: up{job="engineering-dashboard-fastapi"} == 0
        for: 1m
        labels:
          severity: critical
          service: engineering-dashboard
        annotations:
          summary: "FastAPI backend is down"
          description: "Prometheus cannot scrape the engineering dashboard FastAPI metrics endpoint for more than 1 minute."

      - alert: TelemetryStaleWarning
        expr: (time() - engineering_dashboard_latest_telemetry_timestamp_seconds) > 300
        for: 2m
        labels:
          severity: warning
          service: engineering-dashboard
        annotations:
          summary: "Telemetry is getting stale"
          description: "Latest telemetry timestamp is older than 5 minutes for more than 2 minutes."

      - alert: TelemetryStaleCritical
        expr: (time() - engineering_dashboard_latest_telemetry_timestamp_seconds) > 600
        for: 2m
        labels:
          severity: critical
          service: engineering-dashboard
        annotations:
          summary: "Telemetry is critically stale"
          description: "Latest telemetry timestamp is older than 10 minutes for more than 2 minutes."

      - alert: SimulatorInsertFailuresWarning
        expr: increase(engineering_dashboard_simulator_insert_failures_total[10m]) > 0
        for: 2m
        labels:
          severity: warning
          service: engineering-dashboard
        annotations:
          summary: "Simulator insert failures detected"
          description: "One or more simulator insert failures occurred in the last 10 minutes."

      - alert: SimulatorInsertFailuresCritical
        expr: increase(engineering_dashboard_simulator_insert_failures_total[10m]) >= 3
        for: 2m
        labels:
          severity: critical
          service: engineering-dashboard
        annotations:
          summary: "Repeated simulator insert failures"
          description: "Three or more simulator insert failures occurred in the last 10 minutes."