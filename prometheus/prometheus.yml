global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "engineering-dashboard-fastapi"
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ["backend:8000"]
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
